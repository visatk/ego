<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <!-- Accessibility -->
  <title>Visatk Logo</title>
  <desc>A modern, geometric V logo featuring vibrant overlapping tech gradients for the Visatk brand.</desc>

  <defs>
    <!-- Left Arm Gradient: Vibrant Cyan to Deep Royal Blue -->
    <linearGradient id="gradLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F2FE" />
      <stop offset="100%" stop-color="#0047FF" />
    </linearGradient>

    <!-- Right Arm Gradient: Neon Pink to Deep Purple -->
    <linearGradient id="gradRight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF0076" />
      <stop offset="100%" stop-color="#590FB7" />
    </linearGradient>

    <!-- Subtle Drop Shadow for 3D Layering -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="15" flood-color="#000000" flood-opacity="0.4" />
    </filter>

    <!-- Heavy Ambient Glow for Backlighting Effect -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40" result="blur" />
    </filter>

    <!-- Engineering/Architectural Background Grid -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255, 255, 255, 0.03)" stroke-width="1" />
    </pattern>
  </defs>

  <!-- Base Dark Canvas -->
  <rect width="100%" height="100%" fill="#080B12" />
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- Ambient Backlit Orbs -->
  <circle cx="360" cy="280" r="140" fill="#0047FF" filter="url(#glow)" opacity="0.35" />
  <circle cx="480" cy="220" r="110" fill="#FF0076" filter="url(#glow)" opacity="0.25" />

  <!-- 
    Logo Mark: "V"
    Constructed using distinct geometric overlapping strokes to create depth.
    The right arm is drawn first, then the left arm perfectly overlays the bottom vertex.
  -->
  <g>
    <!-- Right Arm (Segmented for 'Node' or 'Toolkit' aesthetic) -->
    <!-- Node Dot -->
    <circle cx="540" cy="160" r="35" fill="url(#gradRight)" filter="url(#shadow)" />
    <!-- Lower Stem -->
    <line x1="484" y1="248" x2="400" y2="380" stroke="url(#gradRight)" stroke-width="70" stroke-linecap="round" filter="url(#shadow)" />

    <!-- Left Arm (Continuous stroke extending to the vertex overlap) -->
    <line x1="260" y1="160" x2="400" y2="380" stroke="url(#gradLeft)" stroke-width="70" stroke-linecap="round" filter="url(#shadow)" />
  </g>

  <!-- Typography: Modern System Fonts for Crisp UI Rendering -->
  <text x="400" y="500" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="48" text-anchor="middle" letter-spacing="0.25em">
    <tspan font-weight="800" fill="#FFFFFF">VISA</tspan><tspan font-weight="300" fill="#00F2FE">TK</tspan>
  </text>
  
</svg>
